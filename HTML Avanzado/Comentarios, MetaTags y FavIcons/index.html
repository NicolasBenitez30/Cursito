<!DOCTYPE html>
<html lang="es"> <!-- Atributo LANG: significa Lenguaje y el valor que le damos es la abreviatura de un idioma, que le decimos al navegador para que identifique el idioma de la pagina.  -->
<head>
    <!-- Etiqueta META:  -->
    <meta charset=""> <!-- Atributo CHARSET: Con este atributo le estamos diciendo cual va a ser la codificacion que va utilizar (la pagina). Valor UTF-8: Es un tipo de codificacion que permite todos los caracteres de todos los idiomas del mundo. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Valor VIEWPORT: la vista de la pagina. Content WIDTH=DEVICE-WIDTH: Le decimos que el ancho de la pagina va a ser igual que el ancho del dispositivo, Es importante para que nuestra pagina se adapte a todos los dispositivos. Content INITIAL-SCALE=1.0: Le decimos cual es la escala inicial en la pagina. -->
    <meta name="description" content="Contenido sobre Comentarios, MetaTAGS y Favicons. Esta Pagina Fue Creada por Nicolas Benitez"> <!-- Valor DESCRIPTION: Nos deja poner una descripcion de la pagina en el "Content" de al menos 100 caracteres.-->
    <meta name="keywords" content="Comentarios, HTML, META TAGS, FAV ICONS"> <!-- Valor Keywords: Palabras Clave de la Pagina, todas esas las escribimos en "CONTENT" y cada palabra separada por una coma (,). -->
    <meta name="author" content="Nicolas Benitez"> <!-- Valor AUTHOR: Define quien creo la pagina, en "content" lo anunciamos. -->
    <meta name="robots" content=""> <!-- Valor ROBOTS: Es para que los motores de busqueda la lean y sepan que hacer. Si el Contenido es "nosnippet" no va permitir que algun motor de busqueda busque algun fragmento de la pagina y lo muestre. Si el contenido es "NOARCHIVE" hace que google no pueda almacenar nuestro archivo en memoria cache. Si el Contenido es "NOIMAGEINDEX" se utiliza para que no se muestre ninguna de nuestras imagenes de la pagina web cuando buscamos imagenes. No se recomienda usar ninguna, excepto para casos puntuales. -->
    <meta name="title" content="Meta TAGS"> <!-- Es el titulo de la pagina -->
    <meta name="og:title" content="Nicolas Benitez"> <!-- Valor OG: Hace que cuando ponen el enlace de la pagina en otro sitio muestre una previsualizacion con estos tres valores: TITLE, DESCRIPTION e IMAGE. -->
    <meta name="og:description" content="Bienvenidos a mi Pagina WEB, van a encontrar contenido de futbol y otras cosas mas, espero que les guste!">
    <meta name="og:image" content="https://lh3.googleusercontent.com/a/ACg8ocICsZvkL_73Tj8NKMEwxseMroVNzkbUvbSlKCqjjMpAk2FFeBqf=s288-c-no">
    <title>Comentarios, Meta Tags y Favicons</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="64x64-PNG-HD.png" type="image/png"> <!-- Esto es el FAV ICON (el icono de la pestaña) -->
</head>
<body>
    <!-- esto es un titulo -->
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio voluptate unde officiis consequatur alias minima, eius consectetur optio aspernatur blanditiis cupiditate ipsa magnam possimus ad! Iste nobis delectus ad perspiciatis?</p>
    <!-- Esto es un COMENTARIO -->
</body>
</html>
