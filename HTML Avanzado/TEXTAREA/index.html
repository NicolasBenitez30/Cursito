<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Text Area</title>
</head>
<body>
    <form>
        <h2>Formulario de Contacto</h2>
        <div class="form_input">
            <input type="text" placeholder="Nombre Completo">
        </div>
        <div class="form_input">
            <input type="email" placeholder="Correo Electronico">
        </div>
        <div class="form_input">
            <textarea rows="8" placeholder="Deja tu comentario"></textarea> <!-- TEXTAREA: (no agregue un significado)  Atributo READONLY: se agrega cuando el texto es solo de lectura, no lo podes modificar. Atributo DISABLED: No se envia el dato y no se enfoca (focus). Atributo MAXLENGHT: Este te permite poner un limete a los caracteres que escribas. ROWS; Te permite asignar un maximo de renglones para escribir antes de que te aparezca la barrita -->
        </div>
    </form>
</body>
</html>
